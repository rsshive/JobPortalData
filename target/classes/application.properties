# CẤU HÌNH QUAN TRỌNG CHO MÁY ẢO YẾU (HikariCP)
# Giới hạn tối đa 5 kết nối để không làm tràn RAM 1GB của VM
spring.datasource.hikari.maximum-pool-size=5
# Thời gian chờ tối đa để lấy 1 kết nối (ms)
spring.datasource.hikari.connection-timeout=30000
# Thời gian tối đa một kết nối được giữ nhàn rỗi
spring.datasource.hikari.idle-timeout=600000
# Tuổi thọ tối đa của một kết nối
spring.datasource.hikari.max-lifetime=1800000

# File Upload Configuration
